project:
  type: website
  output-dir: docs # to publish website on GithubPages
  render:
    - "/**/*.qmd"    # tutti i file .qmd (root or subfolders)
    - "!assets/parma_colours.qmd"
    - "!analysis/**/*.qmd"   # ma NON quelli nella sottocartella analysis/ xche sono intermedi
    - "!zzz/**/*.qmd"   # e NON uelli cdella sottocartella zzz/
    - "!**/zzz/**/*.qmd"  # per escludere qualsiasi zzz/ a qualunque profondità !!!!
    - "!source/**/*.qmd"   # source/ contiene doc interna sulle fonti, non pagine del sito
    # NB: i file che iniziano con "_" (es. R/_fonts.qmd) sono partial di Quarto e
    #     non vengono renderizzati per convenzione.

website:
  bread-crumbs: true   
  title: "Parma analisi di contesto"
  description: "A dashboard for Parma, Italy"
  site-url: "https://lulliter.github.io/analisi_contesto/"
  # favicon: assets/favicon.ico
    # favicon: images/net2.png
  search: false # no magnifier on navbar
  # BANNER (icone vedi https://icons.getbootstrap.com/)
  announcement:
    icon: lock # info-circle | lightbulb | megaphone | lock | cone-striped | calendar | mega | exclamation-triangle
    dismissable: true
    content: "Sito acessibile solo dalla intranet di Fondazione Cariparma: [https://analisidati.fondazionecrp.it/](https://analisidati.fondazionecrp.it/)"
    type: warning #info
    position: below-navbar
  # Footer
  page-footer:
    left: |
      {{< fa brands creative-commons >}}
      {{< fa brands creative-commons-by >}} {{< fa brands creative-commons-nc >}} {{< fa brands creative-commons-sa >}}
      [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/) <br> [Luisa M. Mimmi](mailto:mimmi@fondazionecrp.it)
    right: |
      Made with {{< fa brands r-project >}} and [Quarto](https://quarto.org/) <br>
      [Code at {{< fa brands github >}} GitHub](https://github.com/Lulliter/analisi_contesto)
#      Made with {{< fa brands r-project >}} and ![]({{< var quarto-icon >}}){width=75px} <br> 
    background: "#E5EBEE"
  
# --- Structure of the navbar (opzione A: temi direttamente in navbar)
  navbar:
    pinned: true
    left:
      - text: Home
        href: index.qmd
      - text: "Trend Demografici"
        href: dashboard/demographic_trends/index.qmd
      - text: "Disabilità"
        href: dashboard/disability/index.qmd
      - text: "Non autosufficienza"
        href: dashboard/non_autosufficienza/index.qmd
      - text: "Servizi Sociali"
        href: dashboard/serv_soc/index.qmd
      - text: "BES"
        href: dashboard/bes/index.qmd

    right:
      - icon: github
        aria-label: github
        href: https://github.com/Lulliter/analisi_contesto

# --- Default options for all pages
format:
  html:
    toc: true
    css: assets/styles/custom.css
    # theme: cosmo
    # # theme: styles/parma-theme.scss
    # highlight-style: github
    # mainfont: "Lato"
    # monofont: "Fira Mono"

# --- Default options for tbl and fig captions location (top)
fig-cap-location: top
tbl-cap-location: top
      
# --- Important bc Pandoc’s default resource-path is the directory of each input file
# Let pages see files in the project root (.) and the bib folder explicitly
resource-path: [".", "bib"]
#bibliography: bib/CRP_dash.bib
